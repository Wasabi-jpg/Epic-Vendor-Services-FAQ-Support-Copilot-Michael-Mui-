<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Vendor Support Bot</title>
    <style>
        :root { --epic-blue: #0078d4; --bg: #f3f2f1; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        header { background: var(--epic-blue); color: white; padding: 1rem; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Chat Window */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 8px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--epic-blue); color: white; }
        .bot { align-self: flex-start; background: var(--white); border: 1px solid #ddd; color: #333; }
        
        /* Memory-used line under answer */
        .memory-used { margin-top: 6px; font-size: 0.8rem; color: #666; font-style: italic; }
        /* Sources Styling */
        .sources { margin-top: 8px; font-size: 0.85rem; color: #666; border-top: 1px solid #eee; padding-top: 5px; }
        .source-link { color: var(--epic-blue); text-decoration: none; display: block; margin-top: 2px; }

        /* Input Area */
        .input-area { background: var(--white); padding: 20px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        button { background: var(--epic-blue); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<header>
    <h2>Epic Vendor Services FAQ Bot</h2>
</header>

<div id="chat-container">
    <div class="msg bot">Welcome! How can I help you with Epic Vendor Services today?</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Type your question here..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 1. Display User Message
        appendMessage('user', text);
        userInput.value = '';
        
        // Disable UI while waiting
        sendBtn.disabled = true;
        const loadingMsg = appendMessage('bot', 'Searching FAQ...');

        try {
            // 2. The Fetch Call (Matches your FastAPI POST route)
            const response = await fetch('http://127.0.0.1:8000/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: text }) // Matches your Pydantic "Query" class
            });

            if (!response.ok) throw new Error('Server error');

            const data = await response.json();

            // 3. Display Bot Answer
            loadingMsg.remove();
            appendMessage('bot', data.answer, data.sources, data.memory_used);

        } catch (err) {
            loadingMsg.innerText = "Error: Could not connect to the backend.";
            console.error(err);
        } finally {
            sendBtn.disabled = false;
        }
    }

    function appendMessage(role, text, sources = [], memoryUsed = false) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        
        let content = `<div>${text}</div>`;
        
        if (role === 'bot' && memoryUsed) {
            content += `<div class="memory-used">This reply used your previous messages for context.</div>`;
        }
        
        // If there are sources, format them as clickable links
        if (sources.length > 0) {
            content += `<div class="sources"><strong>Sources:</strong>`;
            sources.forEach(s => {
                content += `<a class="source-link" href="${s.source_url}" target="_blank">🔗 ${s.question}</a>`;
            });
            content += `</div>`;
        }

        div.innerHTML = content;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
    }
</script>

</body>
</html>
